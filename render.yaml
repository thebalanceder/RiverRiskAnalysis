services:
  - type: web
    name: river-risk-analysis
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn river_detective.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RD_CACHE_DIR
        value: /var/data/cache
      - key: RD_UPLOADS_DIR
        value: /var/data/uploads
