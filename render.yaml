services:
  - type: web
    name: river-risk-analysis
    runtime: image
    region: singapore
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RD_CACHE_DIR
        value: /var/data/cache
      - key: RD_UPLOADS_DIR
        value: /var/data/uploads

